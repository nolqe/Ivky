<!doctype html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>のおる — portfolio</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@300;400&display=swap");

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f4f4f2;
      --bg2: #eeeee9;
      --border: #d4d4d0;
      --border2: #e2e2dd;
      --text: #181816;
      --text2: #6a6a65;
      --text3: #b0b0aa;
      --text4: #c8c8c2;
      --serif: "Cormorant Garamond", serif;
      --mono: "DM Mono", monospace;
    }

    html,
    body {
      background: var(--bg);
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100dvh;
      overflow: hidden;
      background: var(--bg);
      font-family: var(--serif);
      color: var(--text);
      font-size: 15px;
    }

    #app::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 999;
      pointer-events: none;
      opacity: 0.028;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 128px 128px;
    }

    canvas#bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    canvas#connections {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
    }

    #sphere-vp {
      position: absolute;
      inset: 0;
      overflow: hidden;
      cursor: grab;
      perspective-origin: 50% 50%;
      z-index: 1;
    }

    #sphere-vp:active {
      cursor: grabbing;
    }

    #globe {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-style: preserve-3d;
      width: 0;
      height: 0;
    }

    .panel {
      position: absolute;
      left: 50%;
      top: 50%;
      transform-style: preserve-3d;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .panel-inner {
      pointer-events: auto;
      cursor: default;
    }

    .panel * {
      transform-style: preserve-3d;
    }

    h1 {
      font-size: clamp(28px, 6vw, 46px);
      font-weight: 300;
      letter-spacing: -0.025em;
      line-height: 1;
      white-space: nowrap;
      transform: translateZ(26px);
    }

    .home-header {
      position: relative;
      display: inline-block;
    }

    .sign-img {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) translateZ(90px);
      height: 250%;
      /* 名前の2.5倍の高さで、はみ出すように被さる */
      width: auto;
      pointer-events: none;
      /* 下の文字は触れるようにする */
      z-index: 2;
    }

    .sub {
      font-family: var(--mono);
      font-size: clamp(9px, 2vw, 10.5px);
      color: var(--text3);
      letter-spacing: 0.18em;
      margin-top: 10px;
      white-space: nowrap;
    }

    .lead {
      font-size: clamp(13px, 3vw, 15px);
      font-weight: 300;
      color: var(--text2);
      line-height: 1.85;
      max-width: 290px;
      margin-top: 14px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      max-width: 290px;
      margin-top: 12px;
    }

    .chip {
      font-family: var(--mono);
      font-size: 8.5px;
      color: var(--text3);
      border: 1px solid var(--border);
      padding: 3px 9px;
      border-radius: 2px;
      letter-spacing: 0.08em;
    }

    .sec-head {
      font-family: var(--mono);
      font-size: 8px;
      color: var(--text4);
      letter-spacing: 0.24em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .work-card {
      width: clamp(210px, 50vw, 250px);
    }

    .wnum {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text4);
      margin-bottom: 5px;
      letter-spacing: 0.05em;
    }

    .wname {
      font-size: clamp(15px, 4vw, 18px);
      font-weight: 400;
      margin-bottom: 5px;
      letter-spacing: -0.01em;
    }

    .wmeta {
      font-family: var(--mono);
      font-size: 8px;
      color: var(--text4);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin: -2px 0 8px;
    }

    .wdesc {
      font-family: var(--mono);
      font-size: clamp(9px, 2vw, 10px);
      color: var(--text2);
      line-height: 1.65;
      font-weight: 300;
      margin-bottom: 10px;
    }

    .wtags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 10px;
    }

    .tag {
      font-family: var(--mono);
      font-size: 8.5px;
      color: var(--text3);
      border: 1px solid var(--border2);
      padding: 2px 7px;
      border-radius: 2px;
    }

    .wlinks {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .wlink,
    .wghost {
      font-family: var(--mono);
      font-size: 8.5px;
      letter-spacing: 0.08em;
      text-decoration: none;
      padding-bottom: 2px;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      display: inline-block;
    }

    .wlink {
      color: var(--text);
      border-bottom: 1px solid var(--text);
      transition: opacity 0.2s;
    }

    .wlink:hover {
      opacity: 0.45;
    }

    .wghost {
      color: var(--text4);
      border-bottom: 1px solid var(--border);
    }

    .yt {
      aspect-ratio: 16/9;
      width: 100%;
      background: #eae9e5;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transform: translateZ(60px);
      transform-style: preserve-3d;
    }

    .yt.is-disabled {
      cursor: default;
      background: linear-gradient(135deg, #ecebe7, #e4e3df);
    }

    .yt.is-disabled .yt-play {
      border-color: rgba(24, 24, 22, 0.14);
      opacity: 0.5;
    }

    .yt.is-disabled .yt-play polygon {
      fill: rgba(24, 24, 22, 0.3);
    }

    .yt-play {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: transparent;
      border: 1px solid rgba(24, 24, 22, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      transition:
        transform 0.25s,
        background 0.25s,
        border-color 0.25s;
      position: relative;
      z-index: 1;
    }

    .yt:hover .yt-play {
      transform: scale(1.06);
    }

    .yt-play svg {
      margin-left: 2px;
      width: 12px;
      height: 12px;
    }

    .yt-play polygon {
      fill: rgba(24, 24, 22, 0.45);
      transition: fill 0.25s;
    }

    .yt-ph {
      display: none;
    }

    .yt iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      border-radius: 6px;
    }

    .yt.has-img::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.04);
      transition: background 0.3s;
    }

    .yt.has-img:hover::before {
      background: rgba(0, 0, 0, 0);
    }

    .yt.has-img .yt-play {
      border-color: rgba(255, 255, 255, 0.85);
      background: rgba(255, 255, 255, 0.08);
      -webkit-backdrop-filter: blur(2px);
      backdrop-filter: blur(2px);
    }

    .yt.has-img .yt-play polygon {
      fill: rgba(255, 255, 255, 0.95);
    }

    .yt.has-img:hover .yt-play {
      background: rgba(255, 255, 255, 0.22);
      border-color: rgba(255, 255, 255, 1);
    }

    .note-img,
    .work-img {
      width: 100%;
      height: auto;
      border-radius: 5px;
      display: block;
      transform: translateZ(60px);
    }

    .note-img {
      margin-bottom: 8px;
      margin-top: 4px;
    }

    .work-img {
      margin-bottom: 10px;
    }

    .note-stack {
      width: clamp(230px, 55vw, 270px);
    }

    .note-item {
      padding: 11px 0;
      transition: transform 0.2s;
    }

    .note-item:hover {
      transform: translateX(2px);
    }

    .ntitle {
      font-size: 15px;
      font-weight: 300;
      display: block;
      margin-bottom: 5px;
    }

    .nmeta {
      font-family: var(--mono);
      font-size: 8px;
      color: var(--text4);
      letter-spacing: 0.08em;
      margin-bottom: 5px;
    }

    .nlink {
      font-family: var(--mono);
      font-size: 8.5px;
      color: var(--text4);
      text-decoration: none;
      letter-spacing: 0.08em;
      transition: color 0.2s;
    }

    .nlink:hover {
      color: var(--text);
    }

    .nlink.is-disabled {
      pointer-events: none;
      opacity: 0.8;
    }

    .price-stack {
      width: clamp(250px, 60vw, 290px);
    }

    .pr-block {
      padding: 12px 0;
      border-bottom: 1px solid var(--border2);
    }

    .pr-block:first-child {
      border-top: 1px solid var(--border2);
    }

    .pr-group-name {
      font-size: 15px;
      font-weight: 400;
      margin-bottom: 8px;
    }

    .pr-sub-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .pr-sub-row {
      display: flex;
      align-items: baseline;
      gap: 12px;
      padding-left: 6px;
      transition: transform 0.2s;
    }

    .pr-sub-row:hover {
      transform: translateX(2px);
    }

    .pr-sub-amt {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text);
      width: 66px;
      flex-shrink: 0;
    }

    .pr-sub-desc {
      font-size: 12px;
      font-weight: 300;
      color: var(--text2);
    }

    .pr-single-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 14px;
      transition: transform 0.2s;
    }

    .pr-single-row:hover {
      transform: translateX(2px);
    }

    .pr-single-name {
      font-size: 15px;
      font-weight: 400;
    }

    .pr-single-amt {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text);
      white-space: nowrap;
    }

    .contact-w {
      width: clamp(250px, 60vw, 290px);
    }

    .clead {
      font-size: 14px;
      font-weight: 300;
      color: var(--text2);
      line-height: 1.85;
      margin-bottom: 18px;
    }

    .dmlink {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text);
      letter-spacing: 0.1em;
      text-decoration: none;
      border-bottom: 1px solid var(--text);
      padding-bottom: 2px;
      transition: opacity 0.2s;
    }

    .dmlink:hover {
      opacity: 0.4;
    }

    .contact-meta {
      font-family: var(--mono);
      font-size: 8px;
      color: var(--text4);
      letter-spacing: 0.08em;
      margin-top: 10px;
      line-height: 1.8;
    }

    .tpl {
      margin-top: 18px;
      padding: 16px;
      background: var(--bg2);
      border-radius: 5px;
      transform: translateZ(40px);
      transform-style: preserve-3d;
    }

    .tpl-label {
      font-family: var(--mono);
      font-size: 7.5px;
      color: var(--text4);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .tpl-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px 16px;
      margin-top: 4px;
    }

    @media (max-width: 480px) {
      .tpl-body {
        grid-template-columns: 1fr;
        gap: 8px;
      }
    }

    .tpl-row {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .tpl-lbl {
      font-family: var(--mono);
      font-size: 8px;
      color: var(--text);
    }

    .tpl-val {
      font-size: 10px;
      color: var(--text2);
    }

    .tpl-ph {
      display: none;
    }

    .cbtn {
      font-family: var(--mono);
      font-size: 8.5px;
      color: var(--text3);
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      margin-top: 10px;
      letter-spacing: 0.08em;
      display: block;
      transition: color 0.2s;
    }

    .cbtn:hover {
      color: var(--text);
    }

    .pole-card {
      text-align: center;
      width: 180px;
    }

    .pole-name {
      font-size: 24px;
      font-weight: 300;
      letter-spacing: -0.02em;
    }

    .pole-sub {
      font-family: var(--mono);
      font-size: 8px;
      color: var(--text3);
      letter-spacing: 0.15em;
      margin-top: 6px;
    }

    .pole-line {
      width: 28px;
      height: 1px;
      background: var(--border);
      margin: 10px auto;
    }

    .filler-card {
      width: 180px;
      text-align: center;
      opacity: 0.38;
    }

    .filler-text {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text);
      letter-spacing: 0.12em;
      line-height: 2;
    }

    /* ctrl strip */
    #ctrl-strip {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 118px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      z-index: 10;
      pointer-events: none;
      background: linear-gradient(to top, rgba(244, 244, 242, 0.8) 0%, rgba(244, 244, 242, 0) 100%);
    }

    #ctrl-strip>* {
      pointer-events: auto;
    }

    @media (max-width: 600px) {
      #ctrl-strip {
        height: 106px;
        gap: 6px;
      }
    }

    /* XY pads */
    .xy-pad {
      position: relative;
      width: 80px;
      height: 80px;
      flex-shrink: 0;
      touch-action: none;
      user-select: none;
    }

    @media (max-width: 600px) {
      .xy-pad {
        width: 64px;
        height: 64px;
      }
    }

    .xy-pad canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
      border-radius: 4px;
    }

    .xy-labels {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .xy-l {
      position: absolute;
      font-family: var(--mono);
      font-size: 6px;
      color: var(--text4);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .xy-lx {
      bottom: -9px;
      left: 50%;
      transform: translateX(-50%);
    }

    .xy-ly {
      left: -2px;
      top: 50%;
      transform: translateY(-50%) rotate(-90deg);
      transform-origin: left center;
    }

    .lfo-btn {
      font-family: var(--mono);
      font-size: 5px;
      color: var(--text4);
      background: none;
      border: 0.5px solid var(--border2);
      border-radius: 3px;
      padding: 1.5px 4px;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: all 0.2s;
    }

    .lfo-btn.active {
      color: var(--text);
      border-color: var(--text3);
      background: rgba(24, 24, 22, 0.04);
    }

    #trackball {
      position: relative;
      width: 90px;
      height: 90px;
      user-select: none;
      touch-action: none;
      flex-shrink: 0;
    }

    @media (max-width: 600px) {
      #trackball {
        width: 74px;
        height: 74px;
      }
    }

    #trackball canvas {
      display: block;
      cursor: grab;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      transition: box-shadow 0.3s;
    }

    #trackball canvas:hover {
      box-shadow: 0 0 16px rgba(24, 24, 22, 0.07);
    }

    #trackball canvas:active {
      cursor: grabbing;
      box-shadow: 0 0 20px rgba(24, 24, 22, 0.1);
    }

    .sub-dial-ch {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
    }

    .sub-dial {
      position: relative;
      width: 48px;
      height: 48px;
      user-select: none;
      touch-action: none;
    }

    @media (max-width: 600px) {
      .sub-dial {
        width: 40px;
        height: 40px;
      }
    }

    .sub-dial svg {
      display: block;
      cursor: grab;
      width: 100%;
      height: 100%;
      transition: filter 0.3s;
    }

    .sub-dial svg:hover {
      filter: drop-shadow(0 0 6px rgba(24, 24, 22, 0.06));
    }

    .sub-dial svg:active {
      cursor: grabbing;
    }

    .sub-dial-label {
      font-family: var(--mono);
      font-size: 7px;
      color: var(--text4);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .sub-dial-val {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: var(--mono);
      font-size: 7px;
      color: var(--text3);
      pointer-events: none;
    }

    .ctrl-div {
      width: 0.5px;
      height: 55px;
      background: rgba(212, 212, 208, 0.4);
      flex-shrink: 0;
      align-self: center;
    }
  </style>
</head>

<body>
  <div id="app">
    <canvas id="bg"></canvas>
    <canvas id="connections"></canvas>
    <div id="sphere-vp">
      <div id="globe"></div>
    </div>
    <div id="ctrl-strip">
      <div class="xy-pad" id="pad-L">
        <canvas id="padL-c"></canvas>
        <div class="xy-labels">
          <span class="xy-l xy-lx">Radius</span><span class="xy-l xy-ly">Persp</span>
        </div>
      </div>
      <div class="ctrl-div"></div>
      <div class="sub-dial-ch">
        <div class="sub-dial" id="sd-x">
          <svg viewBox="0 0 48 48" id="sd-x-svg">
            <circle cx="24" cy="24" r="21" fill="#f0f0ee" stroke="#d8d8d4" stroke-width="0.4" />
            <g id="sd-x-knurl"></g>
            <circle cx="24" cy="24" r="13" fill="#f4f4f2" stroke="#dcdcd8" stroke-width="0.3" />
            <circle cx="24" cy="24" r="1.2" fill="var(--text4)" />
            <g id="sd-x-needle">
              <line x1="24" y1="24" x2="24" y2="6" stroke="var(--text3)" stroke-width="0.8" stroke-linecap="round" />
              <circle cx="24" cy="7" r="1.2" fill="var(--text3)" />
            </g>
          </svg>
          <div class="sub-dial-val" id="sd-x-val">0°</div>
        </div>
        <div class="sub-dial-label">Lon</div>
      </div>
      <div id="trackball">
        <canvas id="tb-canvas" width="180" height="180"></canvas>
      </div>
      <div class="sub-dial-ch">
        <div class="sub-dial" id="sd-y">
          <svg viewBox="0 0 48 48" id="sd-y-svg">
            <circle cx="24" cy="24" r="21" fill="#f0f0ee" stroke="#d8d8d4" stroke-width="0.4" />
            <g id="sd-y-knurl"></g>
            <circle cx="24" cy="24" r="13" fill="#f4f4f2" stroke="#dcdcd8" stroke-width="0.3" />
            <circle cx="24" cy="24" r="1.2" fill="var(--text4)" />
            <g id="sd-y-needle">
              <line x1="24" y1="24" x2="24" y2="6" stroke="var(--text3)" stroke-width="0.8" stroke-linecap="round" />
              <circle cx="24" cy="7" r="1.2" fill="var(--text3)" />
            </g>
          </svg>
          <div class="sub-dial-val" id="sd-y-val">0°</div>
        </div>
        <div class="sub-dial-label">Lat</div>
      </div>
      <div class="ctrl-div"></div>
      <div class="xy-pad" id="pad-R">
        <canvas id="padR-c"></canvas>
        <div class="xy-labels">
          <span class="xy-l xy-lx">Rate</span><span class="xy-l xy-ly">Amp</span>
        </div>
      </div>
    </div>
  </div>
  <script>
    // ====== 配置の順番について ======
    // 要素は配列の「上から順番」に、以下の指定エリアへと配置されていきます。
    // [1番目] 北極 (1個)
    // [2〜5番目] 上の輪 (4個)
    // [6〜11番目] 赤道 (最も外側の輪・6個)
    // [12〜15番目] 下の輪 (4個)
    // [16番目] 南極 (1個)
    // --------------------------------
    // 【入れ替えの方法】配列内の {} ごと切り取り、別の行にペーストするだけで順序を変更できます。

        cy = s,

        const a = (i / 60) * Math.PI * 2;
        lines[0].push([Math.cos(a), 0, Math.sin(a)]);
        lines[1].push([0, Math.cos(a), Math.sin(a)]);
        lines[2].push([Math.cos(a), Math.sin(a), 0]);

        "rgba(24,24,22,0.08)",
        "rgba(24,24,22,0.08)",

        lines[li].forEach((p) => {

            y = cy - wy * r * 0.85;

          } else st = false;

        tx.strokeStyle = col;
        tx.lineWidth = 1.2;
        tx.stroke();

        vM(e);
        padL.move(e);
        padR.move(e);
        if (tD || sDD || vD || padL.isDragging() || padR.isDragging())
          e.preventDefault();
      },
      { passive: false },
    );
    window.addEventListener("mouseup", () => {
      tE();
      sEd();
      vE();
      padL.end();
      padR.end();
    });
    window.addEventListener("touchend", () => {
      tE();
      sEd();
      vE();
      padL.end();
      padR.end();
    });
    vp.addEventListener(
      "wheel",
      (e) => {
        e.preventDefault();
        resetIdle();
        if (iId) {
          cancelAnimationFrame(iId);
          iId = null;
        }
        const s = (Math.PI * 0.3) / vp.offsetWidth;
        aR(e.deltaY * P.speed * s, -e.deltaX * P.speed * s);
        tick();
      },
      { passive: false },
    );
    tick();
    padL.draw();
    padR.draw();
    window.addEventListener("resize", () => {
      tick();
      padL.draw();
      padR.draw();
    });
    // ══════════════════ KEYBOARD NAV ══════════════════
    window.addEventListener("keydown", (e) => {
      if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
      resetIdle();
      const step = 0.12;
      switch (e.key) {
        case "ArrowLeft": aR(-step, 0); tick(); e.preventDefault(); break;
        case "ArrowRight": aR(step, 0); tick(); e.preventDefault(); break;
        case "ArrowUp": aR(0, step); tick(); e.preventDefault(); break;
        case "ArrowDown": aR(0, -step); tick(); e.preventDefault(); break;
      }
    });
  </script>
